name: Build firmware

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

env:
  PICO_SDK_REF: 2.2.0
  TINYUSB_REF: 0.20.0
  PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk

jobs:
  build:
    name: Build UF2 artifacts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake python3 build-essential gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib ninja-build

      - name: Download Pico SDK
        run: |
          git clone --depth 1 --branch "$PICO_SDK_REF" https://github.com/raspberrypi/pico-sdk.git "$PICO_SDK_PATH"
          git -C "$PICO_SDK_PATH" submodule update --init --recursive

      - name: Switch TinyUSB to configured tag
        run: |
          if ! git -C "$PICO_SDK_PATH/lib/tinyusb" rev-parse -q --verify "refs/tags/$TINYUSB_REF" >/dev/null; then
            git -C "$PICO_SDK_PATH/lib/tinyusb" fetch --depth 1 origin "refs/tags/$TINYUSB_REF:refs/tags/$TINYUSB_REF"
          fi
          git -C "$PICO_SDK_PATH/lib/tinyusb" checkout --detach "$TINYUSB_REF"

      - name: Inject Waveshare RP2350B-Plus-W board header
        run: |
          cat > "$PICO_SDK_PATH/src/boards/include/boards/waveshare_rp2350b_plus_w.h" << 'EOF'
          #ifndef _BOARDS_WAVESHARE_RP2350B_PLUS_W_H
          #define _BOARDS_WAVESHARE_RP2350B_PLUS_W_H

          // Tell the SDK build system: RP2350 platform, CYW43 present
          // These pico_board_cmake_set calls are parsed by the SDK cmake layer
          // and are what actually enables the CYW43 driver to be compiled in.
          pico_board_cmake_set(PICO_PLATFORM, rp2350)
          pico_board_cmake_set(PICO_CYW43_SUPPORTED, 1)

          // RP2350B variant (not A)
          // Do NOT define PICO_RP2350A here — this board uses the B die

          // --- FLASH: 16MB W25Q128 ---
          #define PICO_BOOT_STAGE2_CHOOSE_W25Q080 1
          #ifndef PICO_FLASH_SPI_CLKDIV
          #define PICO_FLASH_SPI_CLKDIV 2
          #endif
          #ifndef PICO_FLASH_SIZE_BYTES
          #define PICO_FLASH_SIZE_BYTES (16 * 1024 * 1024)
          #endif

          // --- LED ---
          // LED2 is wired directly to GPIO23 on this board (unlike Pico 2 W where LED is on CYW43)
          #ifndef PICO_DEFAULT_LED_PIN
          #define PICO_DEFAULT_LED_PIN 23
          #endif

          // --- UART ---
          #ifndef PICO_DEFAULT_UART
          #define PICO_DEFAULT_UART 0
          #endif
          #ifndef PICO_DEFAULT_UART_TX_PIN
          #define PICO_DEFAULT_UART_TX_PIN 0
          #endif
          #ifndef PICO_DEFAULT_UART_RX_PIN
          #define PICO_DEFAULT_UART_RX_PIN 1
          #endif

          // --- I2C ---
          #ifndef PICO_DEFAULT_I2C
          #define PICO_DEFAULT_I2C 1
          #endif
          #ifndef PICO_DEFAULT_I2C_SDA_PIN
          #define PICO_DEFAULT_I2C_SDA_PIN 6
          #endif
          #ifndef PICO_DEFAULT_I2C_SCL_PIN
          #define PICO_DEFAULT_I2C_SCL_PIN 7
          #endif

          // --- SPI ---
          #ifndef PICO_DEFAULT_SPI
          #define PICO_DEFAULT_SPI 0
          #endif
          #ifndef PICO_DEFAULT_SPI_SCK_PIN
          #define PICO_DEFAULT_SPI_SCK_PIN 18
          #endif
          #ifndef PICO_DEFAULT_SPI_TX_PIN
          #define PICO_DEFAULT_SPI_TX_PIN 19
          #endif
          #ifndef PICO_DEFAULT_SPI_RX_PIN
          #define PICO_DEFAULT_SPI_RX_PIN 16
          #endif
          #ifndef PICO_DEFAULT_SPI_CSN_PIN
          #define PICO_DEFAULT_SPI_CSN_PIN 17
          #endif

          // --- VSYS ---
          // GPIO46 = VSYS_SENSE, GPIO47 = PSRAM_CS (do not confuse)
          #ifndef PICO_VSYS_PIN
          #define PICO_VSYS_PIN 46
          #endif

          // ── CYW43 / Radio Module 2 (RM2) ──────────────────────────────────────
          // Confirmed from schematic:
          //   WL_ON  → GPIO36  (RM2 B5_WLON)
          //   WL_D   → GPIO37  (RM2 A5_DI, bidirectional; IRQ via R21 10K on B3_IRQ)
          //   WL_CS  → GPIO38  (RM2 B2_CS)
          //   WL_CLK → GPIO39  (RM2 A3_SCLK)
          //   A6_DO  → not connected to RP2350 (bidirectional single-wire design)
          //   B3_IRQ → tied to WL_D via R21 only, no separate GPIO
          //   LED_WLGP0 → RM2 GPIO0 → LED1 (not wired back to RP2350)
          //   VBUS_DET  → RM2 C3_GPIO2

          #ifndef CYW43_WL_GPIO_COUNT
          #define CYW43_WL_GPIO_COUNT 3
          #endif
          #ifndef CYW43_WL_GPIO_LED_PIN
          #define CYW43_WL_GPIO_LED_PIN 0
          #endif
          #ifndef CYW43_WL_GPIO_SMPS_PIN
          #define CYW43_WL_GPIO_SMPS_PIN 1
          #endif
          #ifndef CYW43_WL_GPIO_VBUS_PIN
          #define CYW43_WL_GPIO_VBUS_PIN 2
          #endif
          #ifndef CYW43_PIN_WL_DYNAMIC
          #define CYW43_PIN_WL_DYNAMIC 0
          #endif

          // WL_ON → GPIO36
          #ifndef CYW43_DEFAULT_PIN_WL_REG_ON
          #define CYW43_DEFAULT_PIN_WL_REG_ON 36u
          #endif
          // WL_D → GPIO37 (bidirectional data + IRQ)
          #ifndef CYW43_DEFAULT_PIN_WL_DATA_OUT
          #define CYW43_DEFAULT_PIN_WL_DATA_OUT 37u
          #endif
          #ifndef CYW43_DEFAULT_PIN_WL_DATA_IN
          #define CYW43_DEFAULT_PIN_WL_DATA_IN 37u
          #endif
          #ifndef CYW43_DEFAULT_PIN_WL_HOST_WAKE
          #define CYW43_DEFAULT_PIN_WL_HOST_WAKE 37u
          #endif
          // WL_CLK → GPIO39
          #ifndef CYW43_DEFAULT_PIN_WL_CLOCK
          #define CYW43_DEFAULT_PIN_WL_CLOCK 39u
          #endif
          // WL_CS → GPIO38
          #ifndef CYW43_DEFAULT_PIN_WL_CS
          #define CYW43_DEFAULT_PIN_WL_CS 38u
          #endif

          #ifndef PICO_RP2350_A2_SUPPORTED
          #define PICO_RP2350_A2_SUPPORTED 1
          #endif

          #endif // _BOARDS_WAVESHARE_RP2350B_PLUS_W_H
          EOF

      - name: Patch CMakeLists.txt for Waveshare board
        run: |
          sed -i 's/set(PICO_BOARD pico2_w)/set(PICO_BOARD waveshare_rp2350b_plus_w)/' CMakeLists.txt

      - name: Build standard firmware
        run: |
          cmake -S . -B build/standard -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICO_SDK_PATH="$PICO_SDK_PATH"
          cmake --build build/standard --target ds5-bridge
          mkdir -p artifacts
          cp build/standard/ds5-bridge.uf2 artifacts/ds5-bridge.uf2

      - name: Build DSE firmware
        run: |
          cmake -S . -B build/dse -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICO_SDK_PATH="$PICO_SDK_PATH" \
            -DENABLE_DSE=ON
          cmake --build build/dse --target ds5-bridge
          cp build/dse/ds5-bridge.uf2 artifacts/ds5-bridge-dse.uf2

      - name: Upload standard UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ds5-bridge.uf2
          path: artifacts/ds5-bridge.uf2
          if-no-files-found: error

      - name: Upload DSE UF2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: ds5-bridge-dse.uf2
          path: artifacts/ds5-bridge-dse.uf2
          if-no-files-found: error
